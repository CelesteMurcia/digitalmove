<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#B0BEC5">
  <title>Digital Move</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&family=Nunito:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/bloqueo.css">
  <script src="assets/js/geolocalizacion.js"></script>
</head>

<body>
  
  <div id="bloqueo-desktop">
  <img src="imagenes/logo_inicial.png" alt="Digital Move" style="width:120px; margin-bottom:1.5rem;">
  <i class="fa-solid fa-mobile-screen" style="font-size:3rem; color:#1565C0; margin-bottom:1rem;"></i>
  <h2>Disponible solo en móvil</h2>
  <p>Esta aplicación está diseñada para usarse desde un teléfono o tableta. Por favor accede desde tu dispositivo móvil.</p>
  </div>

  <div class="phone-screen">

    <!-- Zona superior -->
    <div class="top-section">
      <div class="logo-wrap">
        <div class="logo-circle">
          <img src="imagenes/logo_inicial.png" alt="DigitalMove" class="logo-img">
        </div>
      </div>
      <p class="tagline">VIAJA SEGURO, LLEGA SIN APURO</p>
    </div>

    <!-- Zona inferior — card -->
    <div class="bottom-section">
      <div class="card">

        <!-- Vista 1: texto + botón -->
        <div id="vista-bienvenida">
          <p class="card-text">
            Pulsa <strong>"Continuar"</strong> para aceptar los
            términos y permitir tu ubicación.
          </p>
          <button class="btn-continuar" onclick="pedirUbicacion()">
            Continuar
          </button>
        </div>

        <!-- Vista 2: carga (oculta por defecto) -->
        <div id="vista-carga" class="vista-carga oculto">

          <p class="loading-label" id="loading-label">
            Obteniendo ubicación...
          </p>

          <!-- Autobús sobre la barra -->
          <div class="progress-scene">
            <div class="bus-track">
              <div class="bus-on-bar" id="bus-on-bar">
                <div class="bus-exhaust">
                  <span></span><span></span><span></span>
                </div>
                <img src="imagenes/microbusito.png" alt="Bus">
              </div>
            </div>
            <div class="progress-track">
              <div class="progress-fill" id="progress-fill"></div>
            </div>
          </div>

          <p class="progress-pct" id="progress-pct">0%</p>

        </div>

      </div>
    </div>

  </div>

  <script>
    const mensajes = [
      'Obteniendo ubicación...',
      'Cargando rutas disponibles...',
      'Preparando el mapa...',
      'Casi listo...'
    ];

    const etapas = [20, 45, 70, 90];
    let etapaIdx = 0;

    function setProgreso(valor) {
      document.getElementById('progress-fill').style.width = valor + '%';
      document.getElementById('progress-pct').textContent  = valor + '%';
      const pos = Math.min(Math.max(valor, 4), 93);
      document.getElementById('bus-on-bar').style.left = pos + '%';
    }

    window._onGpsListo = function() {
      clearInterval(window._etapaInterval);
      setProgreso(100);
      document.getElementById('progress-pct').classList.add('completo');

      const label = document.getElementById('loading-label');
      label.style.opacity = '0';
      setTimeout(() => {
        label.textContent = '¡Todo listo!';
        label.style.opacity = '1';
      }, 300);

      setTimeout(() => {
        window.location.href = 'pagina1.html';
      }, 900);
    };

    // Esta función se llama desde geolocalizacion.js antes de pedir GPS
    window._iniciarAnimacion = function() {
      // Cambiar vista dentro de la card
      document.getElementById('vista-bienvenida').classList.add('oculto');
      document.getElementById('vista-carga').classList.remove('oculto');

      document.querySelector('.logo-circle').classList.add('pulso-activo');

      setProgreso(0);

      window._etapaInterval = setInterval(() => {
        if (etapaIdx < etapas.length) {
          setProgreso(etapas[etapaIdx]);
          const label = document.getElementById('loading-label');
          label.style.opacity = '0';
          setTimeout(() => {
            label.textContent = mensajes[etapaIdx + 1] || mensajes[etapaIdx];
            label.style.opacity = '1';
          }, 300);
          etapaIdx++;
        }
      }, 1200);
    };
  </script>

</body>
</html>
