<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#e4e4e4">
  <title>Digital Move</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&family=Nunito:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/loading.css">
  <script src="assets/js/geolocalizacion.js"></script>
</head>
<body>

  <div class="phone-screen">

    <!-- Zona superior — idéntica a index.html -->
    <div class="top-section">
      <div class="logo-wrap">
        <div class="logo-circle">
          <img src="imagenes/logo_inicial.png" alt="DigitalMove" class="logo-img">
        </div>
      </div>
      <p class="tagline">VIAJA SEGURO, LLEGA SIN APURO</p>
    </div>

    <!-- Zona inferior con spinner + barra -->
    <div class="bottom-section">
      <div class="card">

        <p class="card-text">Preparando tu experiencia de viaje...</p>

        <!-- Spinner: aro girando con autobús en el centro -->
        <div class="spinner-wrap">
          <svg class="spinner-ring" viewBox="0 0 90 90" xmlns="http://www.w3.org/2000/svg">
            <!-- Aro de fondo -->
            <circle cx="45" cy="45" r="38"
              fill="none"
              stroke="rgba(21,101,192,0.18)"
              stroke-width="6"/>
            <!-- Arco animado con gradiente visual -->
            <circle cx="45" cy="45" r="38"
              fill="none"
              stroke="#1565C0"
              stroke-width="6"
              stroke-linecap="round"
              stroke-dasharray="65 174"
              class="spinner-arc"/>
            <!-- Segundo arco más tenue para dar profundidad -->
            <circle cx="45" cy="45" r="38"
              fill="none"
              stroke="#5C6BC0"
              stroke-width="3"
              stroke-linecap="round"
              stroke-dasharray="25 214"
              stroke-dashoffset="-80"
              opacity="0.5"
              class="spinner-arc"/>
          </svg>
          <img src="imagenes/microbusito.png" alt="Bus" class="spinner-bus">
        </div>

        <!-- Barra de progreso -->
        <div class="progress-wrap">
          <div class="progress-track">
            <div class="progress-bar" id="progress-bar"></div>
          </div>
          <span class="progress-pct" id="progress-pct">0%</span>
        </div>

        <!-- Texto rotativo -->
        <p class="loading-label" id="loading-label">Cargando rutas disponibles...</p>

      </div>
    </div>

  </div>

  <script>
    // ── MENSAJES ROTATIVOS ──
    const mensajes = [
      'Cargando rutas disponibles...',
      'Preparando el mapa...',
      'Sincronizando unidades...',
      'Casi listo...'
    ];

    let msgIdx = 0;
    const label = document.getElementById('loading-label');

    const msgInterval = setInterval(() => {
      msgIdx = (msgIdx + 1) % mensajes.length;
      label.style.opacity = '0';
      setTimeout(() => {
        label.textContent = mensajes[msgIdx];
        label.style.opacity = '1';
      }, 300);
    }, 1800);


    // ── ANIMACIÓN DE PROGRESO VISUAL ──
    const etapas  = [12, 28, 45, 63, 78, 90];
    const delays  = [350, 500, 600, 650, 600, 550];
    let etapaIdx  = 0;

    const barEl  = document.getElementById('progress-bar');
    const pctEl  = document.getElementById('progress-pct');

    function avanzarBarra() {
      if (etapaIdx >= etapas.length) return;
      setTimeout(() => {
        const v = etapas[etapaIdx];
        barEl.style.width = v + '%';
        pctEl.textContent = v + '%';
        etapaIdx++;
        avanzarBarra();
      }, delays[etapaIdx]);
    }

    avanzarBarra();


    // ── ESPERAR QUE LA PÁGINA CARGUE Y LLAMAR AL GPS ──
    window.addEventListener('load', () => {
      setTimeout(() => {
        pedirUbicacionConCallback(function() {
          // Detener mensajes y barra
          clearInterval(msgInterval);

          // Completar al 100%
          barEl.style.width = '100%';
          pctEl.textContent = '100%';
          pctEl.classList.add('completo');

          // Mensaje de éxito
          label.style.opacity = '0';
          setTimeout(() => {
            label.textContent = '¡Todo listo!';
            label.style.opacity = '1';
          }, 300);

          // Redirigir a la app
          setTimeout(() => {
            window.location.href = 'pagina1.html';
          }, 900);
        });
      }, 600);
    });
  </script>

</body>
</html>
